<!DOCTYPE html>
<html lang="en" data-role="loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PalworldStatus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans:wght@400;600&family=Oxanium:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ── Header ────────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <span class="site-title">PalworldStatus</span>
  <div class="header-user" id="header-user">
    <!-- Populated by app.js -->
  </div>
</header>

<!-- ── Login / Denied screen ─────────────────────────────────────────────────── -->
<section class="auth-screen" id="auth-screen">
  <div class="auth-panel">
    <h1 class="auth-title">PalworldStatus</h1>
    <p class="auth-subtitle" id="auth-message">Sign in to view server status.</p>
    <a href="/auth/steam" class="steam-login-btn" id="steam-login-link">
      <img src="https://community.cloudflare.steamstatic.com/public/images/signinthroughsteam/sits_01.png"
           alt="Sign in through Steam" width="180" />
    </a>
    <button class="btn btn-secondary" id="logout-btn" style="display:none">Logout</button>
  </div>
</section>

<!-- ── Main dashboard (whitelisted + admin) ──────────────────────────────────── -->
<main class="dashboard" id="dashboard">
  <!-- Content rendered by app.js based on URL hash -->
  <!-- Landing view: #  -->
  <!-- Detail view:  #server/{containerId} -->
  <div id="view-root"></div>
</main>

<script src="/app.js"></script>
</body>
</html>
